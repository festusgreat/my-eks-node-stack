apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: {{ .Values.postgres.replicaCount }}
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: {{ .Values.postgres.image }}
        ports:
        - containerPort: {{ .Values.postgres.containerPort }}
        
        # This tells the container where to send its internal data to be saved
        volumeMounts:
        - name: postgres-storage
          mountPath: {{ .Values.storage.mountPath }}
          subPath: postgres-data
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
              
      # This registers the volume name and points it directly to your PVC
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.database.host }}
spec:
  selector:
    app: postgres
  ports:
  - port: {{ .Values.postgres.containerPort }}
    targetPort: {{ .Values.postgres.containerPort }}
