{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-app-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx # 👈 This explicitly links this routing rule to your new NGINX controller
  tls:
  - hosts: 
    - {{ .Values.ingress.host | quote }}
    secretName: {{ .Release.Name }}-app-tls-cert
  rules:
  - host: {{ .Values.ingress.host | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: new-app-service # 👈 Matches your ClusterIP app service name exactly
            port:
              number: {{ .Values.app.servicePort }}
{{- end }}
