apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-app
spec: 
  replicas: {{ .Values.app.replicaCount }}
  selector: 
    matchLabels:
      app: new-app
  template:
    metadata:
      labels:
        app: new-app
    spec:
      containers:
      - name: new-app
        image: {{ .Values.app.image }}
        ports:
        - containerPort: {{ .Values.app.containerPort }}
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_HOST
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: new-app-service
spec:
  type: ClusterIP 
  selector:
    app: new-app
  ports:
  - port: {{ .Values.app.servicePort }}
    targetPort: {{ .Values.app.containerPort }}
