name: Deploy Application to EKS

on:
  push:
    branches:
      - main

env:
  VAULT_URL: "http://3.90.231.105:8200" # Replace with your EC2's Public IP or Public DNS
  EKS_CLUSTER_NAME: "Demo-cluster"
  AWS_REGION: "us-east-1" # Replace with your actual AWS region

jobs:
  # JOB 1: Build and Run Security Scans
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Gitleaks Secret Scanner
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Simulated Build and Test Steps
        run: |
          echo "Building application artifacts..."
          echo "Running unit tests... All passed!"

  # JOB 2: Manual Checkpoint Gate
  approval-gate:
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production # Requires manual approval in GitHub UI
    steps:
      - name: Approved
        run: echo "Deployment approved by operator."

  # JOB 3: Secure Automated Deployment
  deploy:
    needs: approval-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Fetch Dynamic Secrets Straight From Your EC2 Vault Container
      - name: Retrieve Secrets from HashiCorp Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_URL }}
          method: token
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/production/database password | DB_PASSWORD ;
            secret/data/production/aws access_key_id | VAULT_AWS_KEY_ID ;
            secret/data/production/aws secret_access_key | VAULT_AWS_SECRET_ACCESS_KEY ;

      # 2. Authenticate to AWS using the Vault-retrieved keys
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.VAULT_AWS_KEY_ID }}
          aws-secret-access-key: ${{ env.VAULT_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Update Kubeconfig context for EKS communication
      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      # 4. Inject Vault's DB_PASSWORD directly into your cluster using Helm
      - name: Deploy Application with Helm
        run: |
          helm upgrade --install new-app ./charts/new-app \
            --set app.secretDbPassword="${{ env.DB_PASSWORD }}"
