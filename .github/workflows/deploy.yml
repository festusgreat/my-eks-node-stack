name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

# Top-level global variables for consistency
env:
  ECR_REPOSITORY: new-app-repo
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull down a copy of your repository files
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for Gitleaks to scan full commit history

    # 2. Gitleaks Scan (Secret Detection Gate)
    - name: Run Gitleaks Secret Scanner
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: false # Stops pipeline if hardcoded keys/secrets are discovered

    # 3. Set up Node.js environment on the runner
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    # 4. Install dependencies and run tests using strict lockfile validation
    - name: Run Application Tests
      run: |
        npm ci --no-audit --no-fund
        npm test

    # 5. Log securely into your AWS account
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 6. Log into Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 7. Build the Docker Image
    - name: Build Docker Image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

    # 8. Trivy Container Vulnerability Scan
    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
        format: 'list'
        exit-code: '0' # Fails the pipeline if critical/high items are found
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'

    # 9. Push Image to ECR (Only triggers if tests, Gitleaks, and Trivy pass!)
    - name: Push Image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # 10. Update Kubernetes cluster resources using Helm
    - name: Deploy to EKS via Helm
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Ensure your local directory context or repo path matches your helm structure
        helm upgrade --install node-release ./my-node-stack \
          --set app.image=$ECR_REGISTRY/$ECR_REPOSITORY \
          --set app.tag=$IMAGE_TAG
